<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보람고 2-3 위키</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📚 보람고 2학년 3반 위키</h1>

<p id="examDday"></p>

<nav>
<a href="timetable.html">시간표</a>
<a href="assignment.html">수행평가</a>
<a href="calendar.html">학사일정</a>
<a href="lunch.html">급식</a>
</nav>

<!-- 수행평가 -->
<a href="assignment.html" class="box-link">
  <div class="box">
    <h2>📢 수행평가</h2>
    <ul id="assignmentList"></ul>
  </div>
</a>

<!-- 학사일정 -->
<a href="calendar.html" class="box-link">
  <div class="box">
    <h2>📅 학사일정</h2>
    <ul id="calendarList"></ul>
  </div>
</a>

<!-- 📸 평가기준표 -->
<div class="box">
<h2>📸 수행평가 평가기준표</h2>

<div class="slider">
  <button class="prev" onclick="slide(-1,'gallery1')">◀</button>

  <div class="gallery" id="gallery1">
    <img src="images/photo1.jpg">
    <img src="images/photo2.jpg">
    <img src="images/photo15.jpg">
  </div>

  <button class="next" onclick="slide(1,'gallery1')">▶</button>
</div>

<button onclick="toggleGallery('gallery1','btn1')" id="btn1">더보기</button>
</div>

<!-- 📸 자료 공유실 -->
<div class="box">
<h2>📸 자료 공유실</h2>

<div class="slider">
  <button class="prev" onclick="slide(-1,'gallery2')">◀</button>

  <div class="gallery" id="gallery2">
    <img src="images/photo3.jpg">
    <img src="images/photo4.jpg">
    <img src="images/photo5.jpg">
    <img src="images/photo6.jpg">
    <img src="images/photo7.jpg">
    <img src="images/photo8.jpg">
    <img src="images/photo9.jpg">
    <img src="images/photo10.jpg">
    <img src="images/photo11.jpg">
    <img src="images/photo12.jpg">
    <img src="images/photo13.jpg">
    <img src="images/photo14.jpg">
  </div>

  <button class="next" onclick="slide(1,'gallery2')">▶</button>
</div>

<button onclick="toggleGallery('gallery2','btn2')" id="btn2">더보기</button>
</div>

<!-- 급식 -->
<a href="lunch.html" class="box-link">
  <div class="box">
    <h2>🍚 급식</h2>
    <p id="lunch">불러오는 중...</p>
  </div>
</a>

<!-- 🔥 사진 확대 팝업 -->
<div id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script src="script.js"></script>

</body>
</html>
